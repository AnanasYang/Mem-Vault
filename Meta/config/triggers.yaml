# 触发规则配置

## 条件触发规则

| 条件 | 触发行为 | 优先级 |
|------|---------|--------|
| 同一话题讨论 > 5 轮 | 自动生成 L1 摘要待确认 | medium |
| 同一行为模式出现 3 次 | 标记为潜在 L2 候选 | high |
| 对话中明确说"这是我的原则" | 标记为潜在 L3/L4 候选 | high |
| 连续 7 天未 review | Heartbeat 主动提醒 | low |
| L1 文件超过 30 天 | 自动归档 | medium |

## 定时触发规则

| 任务 | Cron 表达式 | 说明 |
|------|------------|------|
| L1 每周 Review | `0 9 * * 1` | 每周一 9:00 |
| L2 每月 Review | `0 9 1 * *` | 每月 1 日 9:00 |
| L3 每季度 Review | `0 9 1 1,4,7,10 *` | 季度首日 9:00 |

## 主动触发指令

用户可以输入以下指令触发：
- "帮我 review 这周" → 生成 L1 review 报告
- "总结近期行为模式" → 检测 L2 候选
- "检查认知沉淀" → 检测 L3 候选
- "更新核心价值观" → 人工修改 L4（仅提示）

